events {
    worker_connections 1024;
}

http {
    # Define the upstream group of backend servers
    upstream ecommerce_api {
        # 'backend1' and 'backend2' resolve dynamically to the Docker container IP addresses
        server backend1:5000;
        server backend2:5000;
        
        # Optionally, you can specify load balancing methods here:
        # least_conn; (sends request to server with fewest active connections)
        # ip_hash; (sticky sessions based on client IP)
        # (Default is Round Robin)
    }

    server {
        listen 5000;

        location / {
            proxy_pass http://ecommerce_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Pass real client IP to the backend (critical for rate limiting)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
