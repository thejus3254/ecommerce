version: '3.8'

services:
  # The Nginx Load Balancer
  nginx:
    image: nginx:latest
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - ecommerce_network

  # Centralized Redis Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - ecommerce_network

  # Node.js Backend Instance 1
  backend1:
    build: .
    environment:
      - PORT=5000
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - ecommerce_network

  # Node.js Backend Instance 2
  backend2:
    build: .
    environment:
      - PORT=5000
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge
